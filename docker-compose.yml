services:
  db:
    image: postgres:15
    ports:
      - "5433:5432"
    volumes:                
      - db_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    env_file:
      - .env
  
  app:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER}
    depends_on:
      - db
    ports:
      - "8000:8000"
    command: ["python","-m","uvicorn","server.main:app","--host","0.0.0.0","--port","8000","--reload"]
    volumes:
      - ./src:/app/src

volumes:                   
  db_data: