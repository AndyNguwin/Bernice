services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:                
      - db_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    env_file:
      - .env
  
  bot:
    build: .
    env_file:
      - .env
    depends_on:
      - db

volumes:                   
  db_data:
